<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 380px; font-family: system-ui, -apple-system, sans-serif; background: #f9fafb; padding: 16px; }
    h1 { font-size: 15px; font-weight: 700; color: #111827; margin-bottom: 4px; }
    .subtitle { font-size: 11px; color: #6b7280; margin-bottom: 12px; }
    .config-section { margin-bottom: 12px; }
    .config-section label { font-size: 10px; font-weight: 600; color: #374151; display: block; margin-bottom: 3px; }
    .config-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .config-row input { flex: 1; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 11px; font-family: monospace; }
    .config-row button { padding: 6px 10px; background: #4b5563; color: white; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; white-space: nowrap; }
    .config-row button:hover { background: #374151; }
    #startBtn { width: 100%; padding: 10px; background: #059669; color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
    #startBtn:hover { background: #047857; }
    #startBtn.running { background: #dc2626; }
    #startBtn.running:hover { background: #b91c1c; }
    #startBtn:disabled { background: #9ca3af; cursor: not-allowed; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
    .stat { background: white; padding: 8px; border-radius: 6px; border: 1px solid #e5e7eb; }
    .stat-label { font-size: 10px; color: #6b7280; }
    .stat-value { font-size: 18px; font-weight: 700; color: #111827; }
    .stat-value.approved { color: #16a34a; }
    .stat-value.rejected { color: #dc2626; }
    .stat-value.hidden { color: #d97706; }
    .stat-value.skipped { color: #6b7280; }
    #statusMsg { font-size: 11px; color: #374151; padding: 8px; background: white; border-radius: 6px; border: 1px solid #e5e7eb; min-height: 32px; word-break: break-word; max-height: 80px; overflow-y: auto; }

    /* Currently-analyzing job card with spinner */
    #currentJobBox { display: none; margin-top: 10px; padding: 10px; background: #fffbeb; border: 1px solid #fbbf24; border-radius: 6px; }
    #currentJobBox.visible { display: block; }
    .current-job-row { display: flex; align-items: center; gap: 8px; }
    .spinner { width: 14px; height: 14px; border: 2px solid #fbbf24; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #currentJobTitle { font-size: 11px; font-weight: 600; color: #92400e; word-break: break-word; }
    #currentJobMeta { font-size: 10px; color: #92400e; opacity: 0.85; margin-top: 2px; word-break: break-word; }

    /* Results feed */
    .results-section { margin-top: 12px; }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .results-header span { font-size: 11px; color: #6b7280; font-weight: 600; }
    .results-header button { font-size: 10px; padding: 3px 8px; background: transparent; border: 1px solid #d1d5db; color: #6b7280; border-radius: 4px; cursor: pointer; }
    #resultsFeed { max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .result-card { background: white; border: 1px solid #e5e7eb; border-left-width: 3px; border-radius: 4px; padding: 8px; }
    .result-card.approved { border-left-color: #16a34a; }
    .result-card.rejected, .result-card.easy_apply { border-left-color: #dc2626; }
    .result-card.error, .result-card.analysis_issue, .result-card.unknown { border-left-color: #f97316; }
    .result-card.skipped, .result-card.already_processed { border-left-color: #6b7280; }
    .result-row1 { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; }
    .result-title { font-size: 11px; font-weight: 600; color: #111827; word-break: break-word; flex: 1; }
    .result-badge { font-size: 9px; padding: 2px 6px; border-radius: 10px; font-weight: 700; text-transform: uppercase; white-space: nowrap; }
    .result-badge.approved { background: #dcfce7; color: #15803d; }
    .result-badge.rejected, .result-badge.easy_apply { background: #fee2e2; color: #b91c1c; }
    .result-badge.error, .result-badge.analysis_issue, .result-badge.unknown { background: #ffedd5; color: #c2410c; }
    .result-badge.skipped, .result-badge.already_processed { background: #f3f4f6; color: #4b5563; }
    .result-meta { font-size: 10px; color: #6b7280; margin-top: 2px; word-break: break-word; }
    .result-reason { font-size: 11px; color: #374151; margin-top: 6px; line-height: 1.4; word-break: break-word; white-space: pre-wrap; }

    .log-section { margin-top: 10px; }
    .log-section summary { font-size: 11px; color: #6b7280; cursor: pointer; }
    #logArea { font-size: 10px; font-family: monospace; background: #111827; color: #10b981; padding: 8px; border-radius: 4px; max-height: 150px; overflow-y: auto; margin-top: 6px; white-space: pre-wrap; word-break: break-all; }
    .not-on-linkedin { text-align: center; padding: 20px 0; color: #6b7280; font-size: 12px; }
  </style>
</head>
<body>
  <h1>LinkedIn Job Scanner</h1>
  <div class="subtitle">AI-powered job filter for Armenian developers</div>

  <div class="config-section">
    <label>Server URL</label>
    <div class="config-row">
      <input type="text" id="serverUrlInput" placeholder="https://your-app.vercel.app">
    </div>
    <label>API Key (optional)</label>
    <div class="config-row">
      <input type="text" id="apiKeyInput" placeholder="Extension API Key">
      <button id="saveBtn">Save</button>
    </div>
  </div>

  <div id="mainContent">
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">
      <label style="font-size:10px;display:flex;align-items:center;gap:4px;color:#374151;cursor:pointer">
        <input type="checkbox" id="sendLogsChk"> Send logs to server
      </label>
      <label style="font-size:10px;display:flex;align-items:center;gap:4px;color:#374151;cursor:pointer">
        <input type="checkbox" id="hideApprovedChk"> Also hide approved jobs on LinkedIn
      </label>
    </div>

    <button id="startBtn">Start Scan</button>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Checked</div>
        <div class="stat-value" id="checkedCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Approved</div>
        <div class="stat-value approved" id="approvedCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Hidden</div>
        <div class="stat-value hidden" id="hiddenCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Skipped</div>
        <div class="stat-value skipped" id="skippedCount">0</div>
      </div>
    </div>

    <div id="statusMsg">Ready. Open a LinkedIn job search page and click Start.</div>

    <div id="currentJobBox">
      <div class="current-job-row">
        <div class="spinner"></div>
        <div style="flex:1;min-width:0">
          <div id="currentJobTitle"></div>
          <div id="currentJobMeta"></div>
        </div>
      </div>
    </div>

    <div class="results-section">
      <div class="results-header">
        <span>Results (<span id="resultsCount">0</span>)</span>
        <button id="clearResultsBtn" type="button">Clear</button>
      </div>
      <div id="resultsFeed"></div>
    </div>

    <button id="downloadBtn" style="display:none;width:100%;padding:8px;background:#1d4ed8;color:white;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px">Download Logs</button>

    <details class="log-section">
      <summary>Activity Log (debug)</summary>
      <div id="logArea"></div>
    </details>
  </div>

  <div id="notOnLinkedIn" class="not-on-linkedin" style="display:none">
    Open a LinkedIn job search page first, then click this extension.
  </div>

  <script src="popup.js"></script>
</body>
</html>
