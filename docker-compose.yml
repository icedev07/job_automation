services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-jobbot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobbot}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Database migrations (run once, then exit) ───────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/scanner.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jobbot}
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

  # ── Next.js web app (UI + API) ──────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jobbot}
      JOBBOT_USER_ID: ${JOBBOT_USER_ID:-1}
      RESUMES_OUTPUT_DIR: /data/resumes
      MOHAN_RESUMES_OUTPUT_DIR: /data/resumes_mohan
    volumes:
      - resumes:/data/resumes
      - resumes_mohan:/data/resumes_mohan
      - jobbot_profiles:/data/jobbot
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Scanner: cron-based job board scraping ──────────────────────────────────
  scanner:
    build:
      context: .
      dockerfile: docker/scanner.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jobbot}
      JOBBOT_USER_ID: ${JOBBOT_USER_ID:-1}
      MAX_JOBS: ${MAX_JOBS:-10}
      MATCH_SCORE_THRESHOLD: ${MATCH_SCORE_THRESHOLD:-70}
      JOBOT_DIR: /data/jobbot
      JOBRIGHT_CONTEXT_DIR: /data/jobbot/jobright
      # Cron schedules (override in .env)
      CRON_JOBRIGHT: ${CRON_JOBRIGHT:-0 */2 * * *}
      CRON_ZIPRECRUITER: ${CRON_ZIPRECRUITER:-30 */4 * * *}
      CRON_GLASSDOOR: ${CRON_GLASSDOOR:-0 */4 * * *}
      CRON_DICE: ${CRON_DICE:-15 */4 * * *}
      CRON_SIMPLIFY: ${CRON_SIMPLIFY:-45 */4 * * *}
      # Optional board URLs (set in .env to enable)
      ZIPRECRUITER_SEARCH_URL: ${ZIPRECRUITER_SEARCH_URL:-}
      GLASSDOOR_SEARCH_URL: ${GLASSDOOR_SEARCH_URL:-}
      DICE_SEARCH_URL: ${DICE_SEARCH_URL:-}
      SIMPLIFY_SEARCH_URL: ${SIMPLIFY_SEARCH_URL:-}
    volumes:
      - resumes:/data/resumes
      - resumes_mohan:/data/resumes_mohan
      - jobbot_profiles:/data/jobbot

  # ── DocGen: document generation backfill worker ─────────────────────────────
  docgen:
    build:
      context: .
      dockerfile: docker/docgen.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jobbot}
      BACKFILL_POLL_INTERVAL_SEC: ${BACKFILL_POLL_INTERVAL_SEC:-120}
      RESUMES_OUTPUT_DIR: /data/resumes
      MOHAN_RESUMES_OUTPUT_DIR: /data/resumes_mohan
      CHATGPT_CONTEXT_DIR: /data/jobbot/chatgpt
      CHATGPT_COOKIES_FILE: /data/jobbot/chatgpt-cookies.json
      JOBOT_DIR: /data/jobbot
      RESUME_SAMPLE_PATH: ${RESUME_SAMPLE_PATH:-}
      RESUME_TEMPLATE_PATH: ${RESUME_TEMPLATE_PATH:-}
      COVER_LETTER_TEMPLATE_PATH: ${COVER_LETTER_TEMPLATE_PATH:-}
    volumes:
      - resumes:/data/resumes
      - resumes_mohan:/data/resumes_mohan
      - jobbot_profiles:/data/jobbot
      - ./Resumes/Templates:/app/Resumes/Templates:ro

  # ── PDF converter: watches for new .docx and converts to PDF ────────────────
  pdf-converter:
    build:
      context: .
      dockerfile: docker/pdf.Dockerfile
    restart: unless-stopped
    environment:
      DOCX_PDF_WATCH_ROOTS: /data/resumes_mohan;/data/resumes
      DOCX_PDF_WATCH_POLL_SECONDS: ${DOCX_PDF_WATCH_POLL_SECONDS:-300}
      DOCX_PDF_SUBDIR_WITHIN_DAYS: ${DOCX_PDF_SUBDIR_WITHIN_DAYS:-7}
    volumes:
      - resumes:/data/resumes
      - resumes_mohan:/data/resumes_mohan

volumes:
  pgdata:
  resumes:
  resumes_mohan:
  jobbot_profiles:
